<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Life Portal</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <nav class="tab-bar" aria-label="Life Portal sections">
      <a class="tab is-active" href="/" data-page-link="finance" aria-current="page">
        <span class="tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4 7.5h16M7 4h10a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3Z"/>
            <path d="M8 12h2M14 12h2M8 16h8"/>
          </svg>
        </span>
        <span>Finance</span>
      </a>
      <a class="tab" href="#budget" data-page-link="budget">
        <span class="tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4 6h16M7 6v14M17 6v14"/>
            <path d="M4 20h16M9.5 11h3M9.5 15h5"/>
          </svg>
        </span>
        <span>Budget</span>
      </a>
      <a class="tab" href="#debt" data-page-link="debt">
        <span class="tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M6 4h9l3 3v13H6z"/>
            <path d="M14 4v4h4M9 12h6M9 16h4"/>
          </svg>
        </span>
        <span>Debt</span>
      </a>
      <a class="tab" href="/">
        <span class="tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M8 7V5.5A2.5 2.5 0 0 1 10.5 3h3A2.5 2.5 0 0 1 16 5.5V7"/>
            <path d="M5 7h14a2 2 0 0 1 2 2v8.5a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5V9a2 2 0 0 1 2-2Z"/>
            <path d="M9 13h6"/>
          </svg>
        </span>
        <span>Work</span>
      </a>
    </nav>
    <main aria-label="Finance workspace">
      <section class="finance-page page-view" data-page="finance" aria-labelledby="finance-title">
        <div class="finance-head">
          <h1 id="finance-title">Finance</h1>
          <div class="plaid-actions">
            <span data-plaid-status></span>
            <button class="add-button" type="button" data-link-bank>Link Bank</button>
            <button class="add-button" type="button" data-open-plaid-review hidden>Review Plaid</button>
          </div>
        </div>
        <section class="finance-summary" aria-label="Financial data">
          <div class="summary-totals">
            <div class="summary-metric">
              <span>Total Spending</span>
              <strong data-total-spending>0.00</strong>
            </div>
            <div class="summary-metric">
              <span>Extracted Value</span>
              <strong data-extracted-value>0.00</strong>
            </div>
            <div class="summary-metric">
              <span>Total Income</span>
              <strong data-total-income>0.00</strong>
            </div>
            <div class="summary-metric">
              <span>GDP Contribution</span>
              <strong data-gdp-contribution>0.00</strong>
            </div>
          </div>
          <div class="category-breakdown" data-category-breakdown></div>
          <div class="donut-wrap" aria-label="Spending category chart">
            <div class="donut-chart" data-donut-chart></div>
          </div>
        </section>
        <div class="finance-columns">
          <section class="ledger" aria-labelledby="spending-title">
            <div class="ledger-head">
              <h2 id="spending-title">Spending</h2>
              <div class="ledger-actions">
                <button class="add-button" type="button" data-add-category="spending">Add Category</button>
                <button class="add-button" type="button" data-add-ledger="spending">Add</button>
              </div>
            </div>
            <div class="ledger-list" data-ledger-list="spending" aria-label="Spending log"></div>
          </section>
          <section class="ledger" aria-labelledby="income-title">
            <div class="ledger-head">
              <h2 id="income-title">Income</h2>
              <div class="ledger-actions">
                <button class="add-button" type="button" data-add-category="income">Add Category</button>
                <button class="add-button" type="button" data-add-ledger="income">Add</button>
              </div>
            </div>
            <div class="ledger-list" data-ledger-list="income" aria-label="Income log"></div>
          </section>
        </div>
      </section>
      <section class="budget-page page-view" data-page="budget" aria-labelledby="budget-title" hidden>
        <div class="budget-head">
          <h1 id="budget-title">Budget</h1>
          <button class="add-button" type="button" data-open-budget>Add Budget</button>
        </div>
        <div class="budgets-scroll" data-budgets-scroll aria-label="Budgets"></div>
      </section>
      <section class="debt-page page-view" data-page="debt" aria-labelledby="debt-title" hidden>
        <div class="finance-head">
          <div>
            <h1 id="debt-title">Debt</h1>
            <div class="debt-total">
              <span>Total Debt</span>
              <strong data-total-debt>0.00</strong>
            </div>
          </div>
          <div class="debt-actions">
            <button class="add-button" type="button" data-set-graduation-date>Set Graduation Date</button>
            <button class="add-button" type="button" data-open-loan>Add</button>
          </div>
        </div>
        <div class="finance-columns debt-columns">
          <section class="ledger debt-ledger" aria-labelledby="loans-title">
            <div class="ledger-head">
              <h2 id="loans-title">Loans</h2>
              <span data-graduation-date-label></span>
            </div>
            <div class="ledger-list" data-loan-list aria-label="Loan log"></div>
          </section>
        </div>
      </section>
    </main>
    <dialog class="budget-dialog loan-dialog" data-loan-dialog>
      <form class="budget-form" method="dialog" data-loan-form>
        <div class="budget-dialog-head">
          <h2>New Loan</h2>
          <button class="delete-row" type="button" data-close-loan aria-label="Close loan form">x</button>
        </div>
        <div class="loan-fields">
          <label>
            <span>Name of Loan</span>
            <input class="ledger-input" name="name" type="text" required>
          </label>
          <label>
            <span>Date Issued</span>
            <input class="ledger-input" name="issuedDate" type="text" placeholder="1/1/2026" required>
          </label>
          <label>
            <span>Subsidized/Unsub</span>
            <select class="ledger-select" name="subsidyType">
              <option value="subsidized">Subsidized</option>
              <option value="unsubsidized">Unsub</option>
            </select>
          </label>
          <label>
            <span>Interest %</span>
            <input class="ledger-input" name="interestRate" type="text" inputmode="decimal" placeholder="0">
          </label>
          <label>
            <span>Principal</span>
            <input class="ledger-input amount" name="principal" type="text" inputmode="decimal" placeholder="0">
          </label>
        </div>
        <button class="add-button save-budget" type="submit">Create Loan</button>
      </form>
    </dialog>
    <dialog class="budget-dialog" data-budget-dialog>
      <form class="budget-form" method="dialog" data-budget-form>
        <div class="budget-dialog-head">
          <h2 data-budget-dialog-title>New Budget</h2>
          <button class="delete-row" type="button" data-close-budget aria-label="Close budget form">x</button>
        </div>
        <div class="budget-fields">
          <label>
            <span>Start</span>
            <input class="ledger-input" name="startDate" type="text" placeholder="1/1/2026">
          </label>
          <label>
            <span>End</span>
            <input class="ledger-input" name="endDate" type="text" placeholder="1/31/2026">
          </label>
          <label>
            <span>Required Income</span>
            <input class="ledger-input" name="requiredIncome" type="text" placeholder="0">
          </label>
        </div>
        <div class="budget-category-editor" data-budget-categories></div>
        <div class="budget-form-actions">
          <button class="add-button" type="button" data-add-budget-category>Add Category</button>
          <button class="add-button" type="button" data-add-category="spending">New Spending Category</button>
        </div>
        <button class="add-button save-budget" type="submit" data-save-budget>Create Budget</button>
      </form>
    </dialog>
    <dialog class="budget-dialog confirm-dialog" data-confirm-budget-delete>
      <form class="budget-form" method="dialog">
        <div class="budget-dialog-head">
          <h2>Delete Budget</h2>
          <button class="delete-row" type="button" data-cancel-budget-delete aria-label="Cancel delete">x</button>
        </div>
        <p>Delete this budget?</p>
        <button class="add-button save-budget" type="button" data-confirm-budget-delete-button>Delete</button>
      </form>
    </dialog>
    <dialog class="budget-dialog category-dialog" data-category-dialog>
      <form class="budget-form" method="dialog" data-category-form>
        <div class="budget-dialog-head">
          <h2 data-category-dialog-title>New Category</h2>
          <button class="delete-row" type="button" data-close-category aria-label="Close category form">x</button>
        </div>
        <label class="category-name-field">
          <span>Name</span>
          <input class="ledger-input" name="name" type="text" data-category-name required>
        </label>
        <p class="category-dialog-status" data-category-status></p>
        <button class="add-button save-budget" type="submit" data-save-category>Create Category</button>
      </form>
    </dialog>
    <dialog class="budget-dialog plaid-dialog" data-plaid-dialog>
      <form class="budget-form" method="dialog" data-plaid-form>
        <div class="budget-dialog-head">
          <h2>Review Plaid Transaction</h2>
          <button class="delete-row" type="button" data-close-plaid aria-label="Close Plaid review">x</button>
        </div>
        <div class="plaid-review-summary" data-plaid-review-summary></div>
        <div class="plaid-fields">
          <label>
            <span>Ledger</span>
            <select class="ledger-select" name="ledger" data-plaid-ledger>
              <option value="spending">Spending</option>
              <option value="income">Income</option>
            </select>
          </label>
          <label>
            <span>Category</span>
            <select class="ledger-select" name="category" data-plaid-category></select>
          </label>
        </div>
        <label class="plaid-description">
          <span>Description</span>
          <input class="ledger-input" name="description" type="text" data-plaid-description>
        </label>
        <button class="add-button save-budget" type="submit" data-save-plaid>Save Transaction</button>
      </form>
    </dialog>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
